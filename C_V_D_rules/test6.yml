# sigma-rules/scheduled_tasks.yml
title: Scheduled Task Creation via schtasks.exe
id: abc12345-6789-def0-1234-567890abcdef
status: stable
description: Detects creation of scheduled tasks using schtasks.exe with /create.
author: SOC Team - RAISEGUARD
date: 2025-04-05
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/create'
  condition: selection
falsepositives:
    - Administration légitime
level: medium