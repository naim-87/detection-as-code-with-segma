name: CI - Validate & Convert Rules

on:
  pull_request:
    branches: [ main ]

jobs:
  convert-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          pip install "sigma-cli[sentinel]"

      - name: Get modified Sigma rules
        id: check-sigma
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }}
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD | grep '^sigma-rules/.*\.yml$' || echo "")
          if [ -n "$FILES" ]; then
            echo "sigma_changed=true" >> $GITHUB_OUTPUT
            echo " Detected files:"
            echo "$FILES"
          else
            echo "sigma_changed=false" >> $GITHUB_OUTPUT
          fi
      
      # ✔ Step 1: Strict validation of Sigma rules
      - name: Validate Sigma syntax and structure
        run: |
          echo " Starting validation"
          python scripts/validate_sigma.py --fix sigma-rules/*.yml  
          echo " Validation completed"

      # ✔ Step 2: Convert Sigma rules
      - name: Convert Sigma to DaaC
        if: steps.check-sigma.outputs.sigma_changed == 'true'
        run: |
          echo " Starting Sigma → DaaC conversion"
          set -x  # Enable debug mode
          python scripts/convert_sigma_to_daac.py
          echo " Conversion completed"
          
      # Step 3: Validate against predefined schema
      - name: Validate DaaC rules
        shell: bash
        run: |
          for rule in rules/*.yml; do
            echo " Validating $rule"
            python scripts/validate_rule.py "$rule" schemas/rule-schema.json
            if [ $? -ne 0 ]; then
              exit 1
            fi
          done
          
      # Step 4: Validate KQL syntax
      - name: Validate KQL syntax
        run: python scripts/test_kql_syntax.py