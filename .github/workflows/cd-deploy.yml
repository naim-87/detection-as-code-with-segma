name: CD - Convertir Sigma vers DaaC et Commiter

on:
  push:
    branches: [main]
    paths:
      - 'sigma-rules/**'
      - 'rules/**'
permissions:
  contents: write

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Convert Sigma to DaaC
        run: |
          python scripts/convert_sigma_to_daac.py

      - name: Debug - Git status and diff after conversion
        run: |
          echo "=== GIT STATUS ==="
          git status
          echo "=== GIT DIFF (name-status) ==="
          git diff --name-status rules/
          echo "=== Untracked files ==="
          git ls-files --others --exclude-standard rules/

      - name: Validate DaaC rules
        run: |
          for rule in rules/*.yml; do
            python scripts/validate_rule.py "$rule" schemas/rule-schema.json
            if [ $? -ne 0 ]; then exit 1; fi
          done

      - name: Check if rules changed
        id: changed
        run: |
          git add rules/
          if git diff --cached --quiet; then
            echo "files_changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "files_changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected."
          fi

      - name: Commit and Push converted rules
        if: steps.changed.outputs.files_changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -m "🤖 Auto-convert: Sigma → DaaC [skip ci]"
          git push origin main

      - name: Deploy to Microsoft Sentinel
        if: steps.changed.outputs.files_changed == 'true'
        run: |
          python scripts/deploy_to_sentinel.py
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
          RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
          WORKSPACE_NAME: ${{ secrets.WORKSPACE_NAME }}