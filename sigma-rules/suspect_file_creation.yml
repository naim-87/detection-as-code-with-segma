title: Suspicious Process Injection via Remote Memory Operations
id: 1a2b3c4d-5e6f-7a8b-9c0d-1234567890ac
status: test
description: Detects potential process injection using remote thread creation (Sysmon Event ID 8).
author: RAISEGARD
references:
  - https://attack.mitre.org/techniques/T1055/
logsource:
  category: process_access
  product: windows
  service: sysmon  # Important : préciser que c'est Sysmon
detection:
  selection:
    EventID: 8
    GrantedAccess|contains: '0x1000'
    TargetImage|endswith:
      - '\svchost.exe'
      - '\lsass.exe'
      - '\explorer.exe'
      - '\winlogon.exe'
    StartFunction|contains:
      - 'ntdll.dll!RtlUserThreadStart'
      - 'kernel32.dll!BaseThreadInitThunk'
  filter_known:
    ActingProcessName:
      - 'known_tool.exe'
      - 'trusted_installer.exe'
    InitiatingProcessCommandLine|contains|all:
      - 'C:\\Program Files\\'
      - '.exe'
  condition: selection and not filter_known
level: high
tags:
  - attack.technique:T1055
  - attack.tactic:TA0005