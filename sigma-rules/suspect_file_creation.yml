title: Suspicious Process Injection via Remote Memory Operations
id: 1a2b3c4d-5e6f-7a8b-9c0d-1234567890ac
status: test
description: Detects potential process injection using sequence of OpenProcess, VirtualAllocEx, WriteProcessMemory, CreateRemoteThread
author: RAISEGARD
references:
  - https://attack.mitre.org/techniques/T1055/
logsource:
  category: process_creation
  product: windows
detection:
  selection_api:
    EventID: 8  # Sysmon Event ID for CreateRemoteThread
    TargetImage|endswith: '\\svchost.exe'  # ou autre processus légitime cible
    StartFunction: 'ntdll.dll!RtlUserThreadStart'
  filter_legit:
    CreatorProcessName:
      - 'KnownUpdater.exe'
      - 'LegitInstaller.exe'
  condition: selection_api and not filter_legit
level: high
tags:
  - attack.technique:T1055
  - attack.tactic:TA0005  # Defense Evasion / Privilege Escalation