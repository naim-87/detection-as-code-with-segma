title: Accès suspect au Credential Manager ou Vault
id: 407aecb1-e762-4acf-8c7b-d087bcff3bb6
status: stable
description: |
  Détecte les processus non standard accédant aux fichiers du Credential Manager ou du Vault Windows.
  Ce comportement est souvent observé lors de vols de crédentiels via des outils comme Mimikatz (dpapi::cred).
  La règle exclut les processus système et les applications installées dans Program Files.
references:
    - https://hunter2.gitbook.io/darthsidious/privilege-escalation/mimikatz
    - https://www.absolomb.com/2018-01-26-Windows-Privilege-Escalation-Guide/
author: Nasreddine Bencherchali (Nextron Systems), adapté par [Ton Nom] - RAISEGUARD
date: 2022-10-11
modified: 2025-04-05
tags:
    - attack.t1003.005  # OS Credential Dumping: DPAPI Abuse
    - attack.credential-access
logsource:
    category: file_access
    product: windows
    definition: 'Fournisseur ETW Microsoft-Windows-Kernel-File activé'
detection:
    selection_cred_paths:
        TargetFilename|contains:
            - '\AppData\Local\Microsoft\Credentials\'
            - '\AppData\Roaming\Microsoft\Credentials\'
            - '\AppData\Local\Microsoft\Vault\'
            - '\ProgramData\Microsoft\Vault\'

    selection_suspicious_process:
        # Processus exécutés depuis des emplacements atypiques
        Image|contains:
            - '\Temp\'
            - '\AppData\Local\Temp\'
            - '\Downloads\'
            - '\Users\Public\'
            - '\Windows\Tasks\'
        # OU noms de fichiers suspects
        Image|endswith:
            - '\mimikatz.exe'
            - '\sekurlsa.exe'
            - '\procdump.exe'
            - '\powershell.exe'  # À surveiller en contexte DPAPI
            - '\cmd.exe'         # Souvent utilisé comme vecteur

    filter_known_safe:
        # Exclure les processus légitimes
        - Image|startswith: 'C:\Program Files\'
        - Image|startswith: 'C:\Program Files (x86)\'
        - Image|startswith: 'C:\Windows\system32\'
        - Image|startswith: 'C:\Windows\SysWOW64\'
        # Exclure les processus connus qui accèdent légitimement au vault
        - Image|endswith: '\explorer.exe'
        - Image|endswith: '\lsass.exe'
        - Image|endswith: '\vaultsvc.exe'

    condition: selection_cred_paths and selection_suspicious_process and not 1 of filter_*

falsepositives:
    - Logiciels légitimes exécutés depuis AppData ou Temp (rares)
    - Scripts PowerShell automatisés mal configurés
level: high