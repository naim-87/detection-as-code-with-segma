# sigma-rules/mimikatz-dpapi-cred.yml

title: Dumping des identifiants via Mimikatz - dpapi::cred
id: 7a8b9c0d-1e2f-3a4b-5c6d-7e8f9a0b1c2d
status: test
description: |
  Détecte l'utilisation de la commande 'mimikatz dpapi::cred' pour extraire les identifiants du gestionnaire d'informations d'identification Windows.
  Cette technique est couramment utilisée lors de l'élévation de privilèges ou de la mouvement latéral après avoir obtenu un accès à un système.
  La règle cible l'exécution de mimikatz avec le module dpapi::cred et l'accès aux fichiers de credentials stockés dans AppData.
  
references:
    - https://hunter2.gitbook.io/darthsidious/privilege-escalation/mimikatz
    - https://www.absolomb.com/2018-01-26-Windows-Privilege-Escalation-Guide/
author: SOC Team - RAISEGUARD
date: 2025-04-05
modified: 2025-04-05

logsource:
    category: process_creation
    product: windows

detection:
    selection_image:
        Image|endswith: '\mimikatz.exe'
    selection_cli:
        CommandLine|contains: 'dpapi::cred'
    selection_cred_path:
        # Accès aux fichiers de credentials Windows
        TargetFilename|contains:
            - '\AppData\Local\Microsoft\Credentials\'
            - '\AppData\Roaming\Microsoft\Credentials\'

    condition: selection_image and selection_cli and selection_cred_path

falsepositives:
    - Utilisation légitime par un administrateur (très rare)
    - Outils de forensic autorisés

level: high

tags:
    - attack.credential-access
    - attack.t1003.005  # OS Credential Dumping: DPAPI Abuse
    - T1003.005
    - car.2013-06-001  # Credential dumping