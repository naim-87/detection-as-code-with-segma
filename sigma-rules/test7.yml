title: Suspicious Registry Modification via Reg Command
id: f6a7b8c9-d0e1-6789-4321-abcd98765432
status: experimental
description: Detects suspicious use of reg.exe to modify Windows Registry keys, potentially indicating persistence or configuration tampering
author: dhif
date: 2025/09/07
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\reg.exe'
    CommandLine|contains:
      - 'reg add'
      - 'reg delete'
      - 'reg load'
  filter_legitimate:
    CommandLine|contains:
      - 'HKLM\\Software\\Microsoft\\Windows\\CurrentVersion\\Run'  # Common persistence key, but filter known legitimate uses
      - 'reg add "HKLM\\Software\\Microsoft\\Updates"'  # Example legitimate update-related command
  condition: selection and not filter_legitimate
level: high
tags:
  - attack.persistence
  - attack.defense_evasion
  - ATTACK.T1112  # Modify Registry